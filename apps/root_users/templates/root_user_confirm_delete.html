<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Delete Root User</title>
  </head>
  <body>
    <h1>Delete Root User</h1>
    <p>
      Are you sure you want to delete user:
      <strong>{{ user.username }}</strong>?
    </p>
    <form method="post">
      {% csrf_token %}
      <button type="submit">Yes, delete</button>
      <a href="{% url 'Root_User_List' %}">Cancel</a>
    </form>
  </body>
</html>
